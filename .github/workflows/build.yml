name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, reopened ]

env:
  XCODE_VERSION: "26.2"

jobs:
  test:
    name: Test & Analyze code
    runs-on: macos-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint iosApp --reporter json -> swiftlint.json

      # koverXmlReport executes unit tests internally.
      - name: Lint & test Kotlin code
        if: always()
        run: ./gradlew clean
          ktlintCheck
          detekt
          koverXmlReport
          iosSimulatorArm64Test
          desktopTest
          lintRelease
          --build-cache --parallel --continue

      - name: Publish Kotlin test results
        uses: EnricoMi/publish-unit-test-result-action/macos@d0a4676d0e0b938bc201470d88276b7c74c712b3
        if: always()
        with:
          files: '**/test-results/**/*.xml'
          check_name: 'Kotlin test results'

      - name: Archive Kotlin test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: kotlin-unit-test-results
          path: '**/test-results/**/*.xml'

      - name: Install sonar cli
        uses: Warchant/setup-sonar-scanner@911ef81b14b267a261d70ac94e43d3c822a709d5
        if: always()

      - name: Get ktlint reports file paths
        id: ktlintPath
        if: always()
        run: echo "ktlintReportPaths=$(find **/build/reports/ktlint/**/*.xml | tr "\n" ",")" >> $GITHUB_OUTPUT

      - name: SonarQube Cloud Scan
        if: always()
        run: sonar-scanner -X -Dsonar.kotlin.ktlint.reportPaths=${{ steps.ktlintPath.outputs.ktlintReportPaths }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  swiftTests:
    name: Run swift tests
    runs-on: macos-latest
    env:
      simulatorName: iPhone 17
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Checking out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Pre-boot iOS Simulator
        run: xcrun simctl boot "$simulatorName" || true

      - name: Test Swift code
        if: always()
        run: set -o pipefail && xcodebuild clean test
          -scheme iosApp
          -sdk iphonesimulator
          -destination "platform=iOS Simulator,name=$simulatorName"
          -configuration Release
          -project iosApp/iosApp.xcodeproj
          -resultBundlePath iosApp/build/reports/iosApp.xcresult
          -enableCodeCoverage YES
          CODE_SIGNING_ALLOWED=NO | xcbeautify
          --renderer github-actions
          --report junit
          --report-path iosApp/build/reports/
          --junit-report-filename TEST-XcodeTestResults.xml

#      # Converts XCode's xcresult file to a code coverage format that sonarqube understands,
#      # according to the official guide/example:
#      # https://github.com/SonarSource/sonar-scanning-examples/tree/master/swift-coverage
#      - name: 'Convert code coverage result format'
#        run: bash iosApp/xccov-to-sonarqube-generic.sh iosApp/build/reports/iosApp.xcresult > iosApp/build/reports/Swift-Coverage.xml
#        if: always()

      - name: Publish Swift test results
        uses: EnricoMi/publish-unit-test-result-action/macos@d0a4676d0e0b938bc201470d88276b7c74c712b3
        if: always()
        with:
          files: '**/iosApp/build/reports/**/TEST-*.xml'
          check_name: 'Swift test results'

      - name: Archive Swift test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: swift-test-results
          path: 'iosApp/build/reports/'

  testAndroidInstrumented:
    name: Run Android instrumented tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Checking out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumented tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 34
          arch: x86_64
          script: ./gradlew clean connectedAndroidTest

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/macos@d0a4676d0e0b938bc201470d88276b7c74c712b3
        if: always()
        with:
          files: '**/androidTest-results/**/*.xml'
          check_name: 'Android instrumented test results'

      - name: Archive test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-instrumented-test-results
          path: '**/androidTest-results/**/*.xml'

  buildAndroid:
    name: Build Android app
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Checking out branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Assemble release build
        run: ./gradlew assembleRelease

      - name: Get release file apk path
        id: releaseApk
        run: echo "apkfile=$(find androidApp/build/outputs/apk/release/*.apk)" >> $GITHUB_OUTPUT

      - name: Upload Release Build to Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-artifacts
          path: ${{ steps.releaseApk.outputs.apkfile }}